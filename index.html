<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Smart Study Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>SMART STUDY TRACKER</h1>

        <h2 id="timer">00:00</h2>
        <button id="startBtn">Start Studying</button>

        <p id="feedback"></p>
        <p id="bestSession"></p>

        <br><br>
        <hr>
        <h3>Session History</h3> <button id="clearBtn">Clear</button>
        <h4 id="totalTime">Total Time Locked In: 00:00</h4>
        <ul id="sessionList"></ul>


        <script src="script.js"></script>
    </body>
</html>
